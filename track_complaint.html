<!DOCTYPE html>
<html>
<head>
<title>Track Complaint</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#eef2f7;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* CONTAINER */

.container{
width:400px;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
text-align:center;
}

h2{
color:#007bff;
margin-bottom:25px;
}

/* INPUT */

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

/* BUTTON */

button{
width:100%;
padding:12px;
margin-top:20px;
background:#007bff;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

/* BACK LINK */

.back{
margin-top:15px;
}

.back a{
text-decoration:none;
color:#007bff;
}

</style>

</head>

<body>

<div class="container">

<h2>Track Complaint Status</h2>

<form action="TrackComplaintServlet" method="post">

<label>Enter Complaint ID</label>
<input type="text" name="complaint_id" placeholder="Enter Complaint ID" required>

<button type="submit">Check Status</button>

</form>

<div class="back">
<a href="student_dashboard.html">Back to Dashboard</a>
</div>

</div>

</body>
</html>
