<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Help & Support</title>

<style>

body{
font-family:Arial;
background:#f4f0ff;
margin:0;
padding:0;
}

.container{
width:420px;
margin:80px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(106,13,173,0.3);
}

h2{
text-align:center;
color:#6a0dad;
margin-bottom:20px;
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:linear-gradient(135deg,#6a0dad,#8a2be2);
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#4b0082;
}

.back{
text-align:center;
margin-top:15px;
}

.back a{
text-decoration:none;
color:#6a0dad;
}

</style>
</head>

<body>

<div class="container">

<h2>Help & Support</h2>

<form action="SupportServlet" method="post">

<label>Student Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Issue Subject</label>
<input type="text" name="subject" required>

<label>Message</label>
<textarea name="message" required></textarea>

<button type="submit">Submit Support Request</button>

</form>

<div class="back">
<a href="student_dashboard.html">⬅ Back to Dashboard</a>
</div>

</div>

</body>
</html>
