<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reset Password</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
width:350px;
box-shadow:0 0 10px gray;
border-radius:8px;
text-align:center;
}

h2{
color:#6a0dad;
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#6a0dad;
color:white;
border:none;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#4b0082;
}

</style>

</head>

<body>

<div class="box">

<h2>Reset Password</h2>

<form action="ResetPasswordServlet" method="post">

<input type="text" name="username" placeholder="Enter Username" required>

<input type="password" name="new_password" placeholder="Enter New Password" required>

<input type="password" name="confirm_password" placeholder="Confirm Password" required>

<button type="submit">Update Password</button>

</form>

</div>

</body>
</html>
