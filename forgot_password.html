<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
width:350px;
box-shadow:0 0 10px gray;
border-radius:8px;
}

h2{
text-align:center;
color:#6a0dad;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#6a0dad;
color:white;
border:none;
cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h2>Reset Password</h2>

<form action="ForgotPasswordServlet" method="post">

<input type="text" name="username" placeholder="Enter Username" required>
<input type="email" name="email" placeholder="Enter Email" required>

<button type="submit">Verify</button>

</form>

</div>

</body>
</html>
