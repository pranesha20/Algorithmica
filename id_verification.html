<!DOCTYPE html>
<html>
<head>
<title>Student ID Verification</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
text-align:center;
padding-top:80px;
}

.box{
background:white;
width:400px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
width:80%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#28a745;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1e7e34;
}

</style>

</head>

<body>

<div class="box">

<h2>Student ID Verification</h2>

<form action="VerifyStudentServlet" method="post">

<input type="text" name="ID" placeholder="Enter Student ID" required>

<br>

<input type="text" name="NAME" placeholder="Enter Student Name" required>

<br>

<button type="submit">Verify</button>

</form>

</div>

</body>
</html>
